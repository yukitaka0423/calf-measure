<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LiDAR Calf Measure AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        body { margin: 0; font-family: sans-serif; }
        #info {
            position: absolute; top: 10px; left: 10px; width: 90%;
            background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px;
            z-index: 100; pointer-events: none;
        }
        .dist-val { font-size: 1.5rem; font-weight: bold; color: #007AFF; }
    </style>
</head>
<body>
    <div id="info">
        <div>LiDAR計測モード</div>
        <div id="status">足をスキャンして、端と端をタップ</div>
        <div class="dist-val" id="distance">距離: 0.0 cm</div>
        <div id="circum">推計周径: -- cm</div>
    </div>

    <!-- Three.js と WebXR のライブラリ -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let container, scene, camera, renderer, controller;
        let reticle, hitTestSource = null, hitTestSourceRequested = false;
        let points = [];
        let line = null;

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // AR起動ボタン
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // コントローラー（画面タップ）の設定
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // 計測地点を示すレティクル（円輪）
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.02, 0.03, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x007AFF })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            window.addEventListener('resize', onWindowResize);
        }

        function onSelect() {
            if (reticle.visible) {
                // タップした場所（LiDARが捉えた表面）に点を打つ
                const geometry = new THREE.SphereGeometry(0.005, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const sphere = new THREE.Mesh(geometry, material);
                reticle.matrix.decompose(sphere.position, sphere.quaternion, sphere.scale);
                scene.add(sphere);
                points.push(sphere.position.clone());

                if (points.length >= 2) {
                    updateMeasurement();
                }
            }
        }

        function updateMeasurement() {
            const p1 = points[points.length - 2];
            const p2 = points[points.length - 1];
            const dist = p1.distanceTo(p2); // メートル単位
            const cm = (dist * 100).toFixed(1);

            document.getElementById('distance').innerText = `直径(幅): ${cm} cm`;
            // 円周計算式 (L = d * π)
            const circum = (cm * Math.PI).toFixed(1);
            document.getElementById('circum').innerText = `推計周径: ${circum} cm`;

            // 線を引く
            if (line) scene.remove(line);
            const lineGeom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            line = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ color: 0x00ff00 }));
            scene.add(line);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        session.requestHitTestSource({ space: refSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
